name: CI

on:
  workflow_dispatch:

jobs:
  unix:
    name: Unix (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS Intel x64
            os: macos-15-intel
          - name: macOS ARM64
            os: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev valgrind

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libffi

      - name: Build + tests (FFI)
        run: |
          if [ "${RUNNER_OS}" = "macOS" ]; then
            export CPATH="$(brew --prefix libffi)/include"
            export LIBRARY_PATH="$(brew --prefix libffi)/lib"
          fi
          make clean
          make -j"$(getconf _NPROCESSORS_ONLN || echo 2)"
          tests/run.sh
          tests/run_examples.sh

      - name: Build + tests (DISABLE_SYSTEM=1)
        run: |
          make clean
          make -j"$(getconf _NPROCESSORS_ONLN || echo 2)" DISABLE_SYSTEM=1
          BIN=./papagaio SKIP_FFI=1 tests/run.sh

      - name: Build + tests (DISABLE_SYSTEM=1 + embedded mode)
        run: |
          make clean
          make -j"$(getconf _NPROCESSORS_ONLN || echo 2)" DISABLE_SYSTEM=1
          BIN=./papagaio SKIP_FFI=1 EMBEDDED_MODE=1 tests/run.sh

  windows:
    name: Windows x64 (MSYS2/MinGW64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            diffutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libffi

      - name: Build + tests (FFI)
        shell: msys2 {0}
        run: |
          make clean
          make -j2
          BIN=./papagaio.exe tests/run.sh
          BIN=./papagaio.exe tests/run_examples.sh

      - name: Build + tests (DISABLE_SYSTEM=1)
        shell: msys2 {0}
        run: |
          make clean
          make -j2 DISABLE_SYSTEM=1
          BIN=./papagaio.exe SKIP_FFI=1 tests/run.sh

      - name: Build + tests (DISABLE_SYSTEM=1 + embedded mode)
        shell: msys2 {0}
        run: |
          make clean
          make -j2 DISABLE_SYSTEM=1
          BIN=./papagaio.exe SKIP_FFI=1 EMBEDDED_MODE=1 tests/run.sh

  windows-msvc:
    name: Windows x64 (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libffi (vcpkg)
        shell: powershell
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg not found at $vcpkg"
          }
          & $vcpkg install libffi:x64-windows

      - name: Configure (CMake + MSVC)
        run: |
          cmake -S . -B build-msvc -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build (Release)
        run: |
          cmake --build build-msvc --config Release -j2

      - name: Configure + Build (Release, DISABLE_SYSTEM=ON)
        run: |
          cmake -S . -B build-msvc-embedded -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDISABLE_SYSTEM=ON
          cmake --build build-msvc-embedded --config Release -j2

      - name: Probe C.ffi.bind availability
        shell: powershell
        run: |
          $probe = Join-Path $env:TEMP "msvc_ffi_probe.urb"
          @"
          println(C.ffi.bind.type);
          "@ | Set-Content -Encoding ASCII $probe
          $out = & .\build-msvc\Release\papagaio.exe $probe
          if ($out -notmatch "native") {
            throw "ffi probe failed: expected 'native' in output; got: $out"
          }
          Remove-Item -Force $probe

      - name: Tests
        shell: bash
        run: |
          BIN=./build-msvc/Release/papagaio.exe SKIP_FFI_NATIVE=1 tests/run.sh
