name: Release Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.2.0)"
        required: true
        type: string
      create_tag:
        description: "Create tag vX.Y.Z if it does not exist"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  obsidian:
    name: Build Obsidian plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build papagaio WASM plugin
        run: |
          make obsidian

      - name: Package plugin artifact
        run: |
          mkdir -p dist
          cp -r .obsidian/plugin/papagaio-obsidian dist/
          tar -czf "dist/papagaio-v${{ inputs.version }}-obsidian.tar.gz" -C dist papagaio-obsidian

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-obsidian
          path: dist/papagaio-v${{ inputs.version }}-obsidian.tar.gz

  wasm:
    name: Build WASM runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM module
        run: |
          make wasm

      - name: Package WASM artifact
        run: |
          mkdir -p dist
          cp papagaio.js papagaio.wasm dist/
          tar -czf "dist/papagaio-v${{ inputs.version }}-wasm.tar.gz" -C dist papagaio.js papagaio.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-wasm
          path: dist/papagaio-v${{ inputs.version }}-wasm.tar.gz

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: linux
            archive: linux-x64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: linux-arm64
            archive: linux-arm64
          - name: macOS Intel x64
            os: macos-15-intel
            target: macos-intel
            archive: macos-x64
          - name: macOS ARM64
            os: macos-14
            target: macos-arm64
            archive: macos-arm64
          - name: Windows x64 (MSYS2/MinGW64)
            os: windows-latest
            target: windows-mingw
            archive: windows-x64-mingw
          - name: Windows x64 (MSVC)
            os: windows-latest
            target: windows-msvc
            archive: windows-x64-msvc
          - name: Linux x86 32-bit
            os: ubuntu-latest
            target: linux-x86
            archive: linux-x86
          - name: Linux ARMv7 32-bit
            os: ubuntu-latest
            target: linux-armv7
            archive: linux-armv7
          - name: Windows x86 32-bit (MSYS2/MinGW32)
            os: windows-latest
            target: windows-mingw32
            archive: windows-x86-mingw
          - name: Windows x86 32-bit (MSVC)
            os: windows-latest
            target: windows-msvc32
            archive: windows-x86-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        shell: bash
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            exit 1
          fi

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Install cross-compile toolchain (Linux x86 32-bit)
        if: matrix.target == 'linux-x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libffi-dev:i386

      - name: Install cross-compile toolchain (Linux ARMv7)
        if: matrix.target == 'linux-armv7'
        run: |
          sudo apt-get install -y gcc-arm-linux-gnueabihf libffi-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.target, 'macos')
        run: |
          brew update
          brew install libffi

      - name: Setup MSYS2 (Windows MinGW)
        if: matrix.target == 'windows-mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libffi

      - name: Setup MSYS2 (Windows MinGW32)
        if: matrix.target == 'windows-mingw32'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            git
            make
            mingw-w64-i686-gcc
            mingw-w64-i686-libffi

      - name: Build binary (Linux/macOS)
        if: startsWith(matrix.target, 'linux') || startsWith(matrix.target, 'macos')
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "macOS" ]; then
            export CPATH="$(brew --prefix libffi)/include"
            export LIBRARY_PATH="$(brew --prefix libffi)/lib"
          fi
          if [ "${{ matrix.target }}" = "linux-x86" ]; then
            export CFLAGS="-m32"
            export LDFLAGS="-m32"
          elif [ "${{ matrix.target }}" = "linux-armv7" ]; then
            export CC=arm-linux-gnueabihf-gcc
            export CROSS_COMPILE=arm-linux-gnueabihf-
          fi
          make clean
          make -j"$(getconf _NPROCESSORS_ONLN || echo 2)"

      - name: Build binary (Windows MinGW)
        if: matrix.target == 'windows-mingw'
        shell: msys2 {0}
        run: |
          make clean
          make -j2

      - name: Build binary (Windows MinGW32)
        if: matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          make clean
          make -j2

      - name: Build binary (Windows MSVC)
        if: matrix.target == 'windows-msvc'
        shell: powershell
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg not found at $vcpkg"
          }
          & $vcpkg install libffi:x64-windows
          cmake -S . -B build-msvc -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build-msvc --config Release -j2

      - name: Build binary (Windows MSVC32)
        if: matrix.target == 'windows-msvc32'
        shell: powershell
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg not found at $vcpkg"
          }
          & $vcpkg install libffi:x86-windows
          cmake -S . -B build-msvc32 -A Win32 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows
          cmake --build build-msvc32 --config Release -j2

      - name: Package artifact (Linux)
        if: startsWith(matrix.target, 'linux')
        shell: bash
        run: |
          mkdir -p dist
          cp papagaio dist/
          cp README.md CHANGELOG.md dist/
          cp -r examples dist/
          tar -czf "dist/papagaio-v${{ inputs.version }}-${{ matrix.archive }}.tar.gz" -C dist papagaio README.md CHANGELOG.md examples

      - name: Package artifact (macOS)
        if: startsWith(matrix.target, 'macos')
        shell: bash
        run: |
          mkdir -p dist
          cp papagaio dist/
          cp README.md CHANGELOG.md dist/
          cp -r examples dist/
          tar -czf "dist/papagaio-v${{ inputs.version }}-${{ matrix.archive }}.tar.gz" -C dist papagaio README.md CHANGELOG.md examples

      - name: Package artifact (Windows MinGW)
        if: matrix.target == 'windows-mingw'
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp papagaio.exe dist/
          cp README.md CHANGELOG.md dist/
          cp -r examples dist/
          powershell -NoProfile -Command "Compress-Archive -Path dist\\papagaio.exe,dist\\README.md,dist\\CHANGELOG.md,dist\\examples -DestinationPath dist\\papagaio-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force"

      - name: Package artifact (Windows MinGW32)
        if: matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp papagaio.exe dist/
          cp README.md CHANGELOG.md dist/
          cp -r examples dist/
          powershell -NoProfile -Command "Compress-Archive -Path dist\\papagaio.exe,dist\\README.md,dist\\CHANGELOG.md,dist\\examples -DestinationPath dist\\papagaio-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force"

      - name: Package artifact (Windows MSVC)
        if: matrix.target == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build-msvc/Release/papagaio.exe dist/
          Copy-Item README.md,CHANGELOG.md dist/
          Copy-Item -Recurse examples dist/
          Compress-Archive -Path dist/papagaio.exe,dist/README.md,dist/CHANGELOG.md,dist/examples -DestinationPath dist/papagaio-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force

      - name: Package artifact (Windows MSVC32)
        if: matrix.target == 'windows-msvc32'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build-msvc32/Release/papagaio.exe dist/
          Copy-Item README.md,CHANGELOG.md dist/
          Copy-Item -Recurse examples dist/
          Compress-Archive -Path dist/papagaio.exe,dist/README.md,dist/CHANGELOG.md,dist/examples -DestinationPath dist/papagaio-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: papagaio-${{ matrix.target }}
          path: dist/papagaio-v${{ inputs.version }}-*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, wasm, obsidian]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if requested
        if: inputs.create_tag
        run: |
          tag="v${{ inputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog notes
        id: notes
        run: |
          version="${{ inputs.version }}"
          notes="$(awk -v v="$version" '
            $0 ~ "^## " v "$" { in_section=1; next }
            in_section && $0 ~ "^## " { exit }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="Release v$version"
          fi
          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Clean existing release assets for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release view "$tag" --json assets --jq '.assets[].name' | while read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$tag" "$asset" -y
            done
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/**/papagaio-v${{ inputs.version }}-*